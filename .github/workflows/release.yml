name: Release

on:
    push:
        branches: [master]
        tags: ['v*']
    pull_request:
        branches: [master]

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
    contents: read

jobs:
    test:
        name: 🧪 Testing
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2

            - name: cargo test
              run: cargo test

            - name: cargo clippy
              run: cargo clippy -- -D warnings

    build:
        name: 🔨 Build
        needs: test
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2

            - name: Install dependencies
              run: brew install librsvg create-dmg

            - name: Generate AppIcon.icns
              run: ./scripts/make-icns.sh

            - name: Install cargo-bundle
              run: cargo install cargo-bundle

            - name: Build app bundle
              run: cargo bundle --release

            - name: Ad-hoc sign
              run: codesign --deep --force --sign - target/release/bundle/osx/Talpa.app

            - name: Create DMG
              run: |
                  create-dmg \
                    --volname "Talpa" \
                    --icon-size 100 \
                    --icon "Talpa.app" 175 190 \
                    --hide-extension "Talpa.app" \
                    --app-drop-link 425 190 \
                    "Talpa.dmg" \
                    "target/release/bundle/osx/"

            - name: Zip app bundle
              run: |
                  cd target/release/bundle/osx
                  zip -r "$GITHUB_WORKSPACE/Talpa.zip" Talpa.app

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: Talpa-macos
                  path: |
                      Talpa.dmg
                      Talpa.zip

    release:
        name: 🚀 Release
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Generate release notes
              uses: orhun/git-cliff-action@v4
              id: cliff
              with:
                  args: --latest --strip header

            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: Talpa-macos

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ github.ref_name }}
                  body: ${{ steps.cliff.outputs.content }}
                  files: |
                      Talpa.dmg
                      Talpa.zip
