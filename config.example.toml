domains = ["**.example.com", "*.example.org"]
ips     = ["10.0.0.0/8", "192.168.1.100"]

[listen]
addr = "127.0.0.1"
port = 1080

[upstream]
addr = "127.0.0.1"
port = 10808

[ssh_tunnel]
user       = "user"
host       = "ssh.example.com"
ssh_port   = 22
local_port = 10808
# password = "secret"   # omit to use key-based auth

[system_proxy]
enabled        = true
configure_npm  = true
configure_git  = true
configure_curl = true

[dns]
listen_port  = 5300
upstream_dns = "ssh.example.com:53"
fallback_dns = "192.168.0.1:53"
